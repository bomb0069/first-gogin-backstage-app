apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: first-gogin-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bomb0069/first-gogin-backstage-app.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: first-gogin-app
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
